user www-data;
worker_processes auto;
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections 768;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Basic MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Settings
    access_log /var/log/nginx/access.log;

    # Gzip Settings
    gzip on;

    # Remove file upload size limit
    client_max_body_size 8G;

    # Rate Limiting Zones
    limit_conn_zone $binary_remote_addr zone=strict:10m;
    limit_conn_zone $binary_remote_addr zone=normal:10m;
    limit_req_zone $binary_remote_addr zone=index_req:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=other_req:10m rate=50r/s;

    # Security Headers (apply globally)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;
    
    # Upstream to Node.js application
    upstream artemis {
        server localhost:3000;
    }

    # HTTPS Server - Artemis Node.js App (port 8003)
    server {
        listen 8003 ssl;
        server_name _;

        # SSL Security - custom certificates
        ssl_certificate /etc/nginx/ssl/artemis.crt;
        ssl_certificate_key /etc/nginx/ssl/artemis.key;
        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Block requests with no user agent
        if ($http_user_agent = "") {
            return 444;
        }

        # Block common bot patterns
        if ($http_user_agent ~* (curl|wget|python|perl|java)) {
            return 444;
        }

        # INDEX PAGE - STRICT PROTECTION
        location = / {
            limit_conn normal 5;
            limit_req zone=index_req burst=20 nodelay;
            
            proxy_pass http://artemis;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ALL OTHER PAGES - NORMAL PROTECTION
        location / {
            limit_conn normal 10;
            limit_req zone=other_req burst=50 nodelay;
            
            proxy_pass http://artemis;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}